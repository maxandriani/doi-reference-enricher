name: Publish to PyPI

on:
  release:
    types:
      - published

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      is_semver: ${{ steps.tag.outputs.is_semver }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Validate semver tag
        id: tag
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          if [[ "$TAG_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+(a[0-9]+)?$ ]]; then
            echo "is_semver=true" >> "$GITHUB_OUTPUT"
            echo "version=$TAG_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "is_semver=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

  test:
    runs-on: ubuntu-latest
    needs: validate-tag
    if: needs.validate-tag.outputs.is_semver == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e '.[test]'

      - name: Run unit tests
        run: pytest -q

  publish:
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - test
    if: needs.validate-tag.outputs.is_semver == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump version from tag
        env:
          RELEASE_VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          version = os.environ.get("RELEASE_VERSION", "").strip()
          if not version:
              raise SystemExit("Missing release version")

          pyproject = pathlib.Path("pyproject.toml")
          text = pyproject.read_text()
          updated = re.sub(
              r'(?m)^version\s*=\s*".*"$',
              f'version = "{version}"',
              text,
              count=1,
          )
          if updated == text:
              raise SystemExit("Unable to update version in pyproject.toml")
          pyproject.write_text(updated)
          PY
        shell: bash

      - name: Build package
        run: |
          python -m pip install build
          python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
